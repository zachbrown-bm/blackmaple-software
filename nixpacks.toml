# Tell Nixpacks to stop using its built-in automated Rust provider
providers = ["staticfile"]

[phases.setup]
# Install basic dependencies needed for downloads and compilation
nixPkgs = ["curl", "gcc", "pkg-config", "openssl"]

[phases.install]
cmds = [
    # 1. Download and silently install rustup into the environment
    "curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y",

    # 2. Add the Cargo binary directory to the active path for this stage
    "export PATH=\"$HOME/.cargo/bin:$PATH\"",

    # 3. Add the wasm32 compilation target via rustup
    "rustup target add wasm32-unknown-unknown",

    # 4. Fetch the pre-compiled Trunk binary directly into the cargo folder
    "curl -L --proto '=https' --tlsv1.2 -sSf https://githubusercontent.com | BINDIR=$HOME/.cargo/bin sh"
]

[phases.build]
# Prepend the PATH so the shell can find both trunk and rustup
cmds = ["export PATH=\"$HOME/.cargo/bin:$PATH\" && trunk build --release"]

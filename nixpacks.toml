providers = ["rust"]

[phases.setup]
# Use native Nix packages to instantly install pre-compiled trunk and wasm targets
nixPkgs = ["...", "trunk", "wasm-bindgen-cli"]
aptPkgs = ["...", "libssl-dev", "pkg-config"]

[phases.build]
# Runs with trunk natively available in the PATH via nixPkgs
cmds = ["trunk build --release"]
